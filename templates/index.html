{% extends "layout.html" %}
{% block content %}
<h1>منتجات مختارة</h1>

<div class="grid">
  {% for p in products %}
    <div class="card">
      <img src="{{ p.image_url }}" alt="{{ p.name }}">
      <h3>{{ p.name }}</h3>
      <p class="price">{{ '%.2f'|format(p.price) }} د.ك</p>
      <a class="btn" href="{{ url_for('product_detail', pid=p.id) }}">تفاصيل</a>
    </div>
  {% endfor %}
</div>
{% endblock %}
